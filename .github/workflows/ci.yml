name: CI/CD

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::595658221962:role/gha-deployer
          aws-region: eu-west-1

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Catalog Service
        uses: docker/build-push-action@v6
        with:
          context: ./services/catalog-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/catalog-service:latest

      - name: Build and push Order Service
        uses: docker/build-push-action@v6
        with:
          context: ./services/order-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/order-service:latest

      - name: Build and push Notification Service
        uses: docker/build-push-action@v6
        with:
          context: ./services/notification-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/notification-service:latest